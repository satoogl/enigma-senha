<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enigma</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    text-align:center;
}

h1{ color:white; }

input{
    padding:12px;
    font-size:20px;
    border:none;
    border-radius:10px;
    text-align:center;
}

button{
    margin-top:15px;
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#mensagem{
    margin-top:20px;
    font-size:22px;
    color:white;
    font-weight:bold;
}

.confete{
    position:fixed;
    width:10px;
    height:10px;
    top:-20px;
    animation:cair linear forwards;
}

@keyframes cair{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}
</style>
</head>

<body>

<h1>Digite a senha ❤️</h1>

<input id="senha" maxlength="6">
<button onclick="verificar()">Confirmar</button>

<div id="mensagem"></div>

<script>

function criarConfetes(){
    const cores=["#ff0000","#00ff00","#0000ff","#ffff00","#ff00ff","#00ffff","#ffffff"];

    for(let i=0;i<150;i++){
        const c=document.createElement("div");
        c.classList.add("confete");
        c.style.left=Math.random()*100+"vw";
        c.style.background=cores[Math.floor(Math.random()*cores.length)];
        c.style.animationDuration=(Math.random()*3+2)+"s";
        document.body.appendChild(c);

        setTimeout(()=>c.remove(),5000);
    }
}

function verificar(){

    const senha=document.getElementById("senha").value.trim();

    if(senha==="250425"){

        document.getElementById("mensagem").innerHTML=
        "🎉 Parabéns! Você acertou! 🎉";

        criarConfetes();

        setTimeout(()=>{
            document.getElementById("mensagem").innerHTML+=`
            <br><br>
            <button onclick="irCanva()">
                Ir para próxima fase ❤️
            </button>
            `;
        },1200);

    } else {
        document.getElementById("mensagem").innerHTML=
        "❌ Senha incorreta!";
    }
}

// BOTÃO QUE REALMENTE ABRE O CANVA
function irCanva(){
    window.open("https://canva.link/182ancuv7t2ri7d", "_blank");
}

</script>

</body>
</html>
